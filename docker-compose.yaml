services:
  # Updated Spark service (The "Super-Dockerfile" for Blackwell/GB10)
  voxhub-spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        MODEL_ID: ${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
        PREDOWNLOAD_MODEL: ${PREDOWNLOAD_MODEL:-1}
    image: voxhub:spark
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
    command: --help

  # Legacy/Other platform fallbacks (kept for compatibility)
  voxhub-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: voxhub:rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    privileged: true
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device rocm

  voxhub-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: voxhub:cpu
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device cpu

  # ─── VoxHub OpenAI-Compatible API ────────────────────────────
  voxhub-api:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: voxhub-api:spark
    # Pin the container name and hostname so other compose projects on the
    # shared network can address it as http://voxhub-api:8000 regardless of
    # this project's directory name (which compose otherwise prefixes).
    container_name: voxhub-api
    hostname: voxhub-api
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VOXHUB_MODEL=${VOXHUB_MODEL:-whisper:turbo}
      - VOXHUB_VAD=hybrid
      - VOXHUB_DIARIZE=true
      - VOXHUB_DEVICE=auto
    entrypoint: ["python", "server.py"]
    networks:
      - default       # keeps intra-project links working
      - proxy-net     # shared network reachable from sibling compose stacks

volumes:
  multi_hf_cache:

networks:
  # External shared network for cross-project DNS resolution. Sibling compose
  # projects (e.g. OpenHiNotes) attach to the same network and can then
  # reach this service at http://voxhub-api:8000.
  #
  # The network is declared `external` here on purpose — VoxHub does not own
  # it, it just joins it. Whichever stack creates it first should declare it,
  # the rest reference it as external. If no other project creates it, run:
  #     docker network create proxy-net
  #
  # See README ("Cross-project networking") for the OpenHiNotes-side block.
  proxy-net:
    external: true
    name: proxy-net
