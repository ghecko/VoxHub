# ─── VoxHub Model Registry ────────────────────────────
# Add, remove, or modify models here.
# Use --model all to benchmark every model listed below.
# Use --model <key> to run a specific one (e.g. --model whisper:small).
#
# Fields:
#   module:  Python module path containing the transcriber class
#   class:   Class name inside that module
#   args:    Default keyword arguments passed to the class constructor
#   enabled: Set to false to skip this model in --model all runs

# ── Voxtral (Mistral) ──────────────────────────────────────────
# Two backends are available per Voxtral model:
#   voxtral:<name>        – in-process via HuggingFace transformers
#                           (lazy-loaded, zero extra infra, good for dev)
#   voxtral:<name>-vllm   – remote via the voxtral-vllm compose service
#                           (higher throughput, requires `--profile vllm`)
# Both can be enabled at the same time; the model chosen at request time
# (`model=voxtral:mini-3b` vs `model=voxtral:mini-3b-vllm`) decides which
# path runs. See README for the full tradeoffs.

# --- Transformers backend (default, in-process) ---
voxtral:mini-3b:
  module: core.transcribe
  class: VoxtralTranscriber
  args:
    model_id: mistralai/Voxtral-Mini-3B-2507
    # Attention backend is auto-resolved by core/transcribe.py:
    #   blackwell (GB10/B200)  → "eager"            (SDPA sw-window bug; FA2 no official wheel)
    #   cuda (Ampere/Ada/Hop.) → "flash_attention_2" (fallback to eager if flash-attn missing)
    #   rocm / cpu             → "sdpa"
    # Override by uncommenting one of:
    # attn_implementation: sdpa
    # attn_implementation: eager
    # attn_implementation: flash_attention_2
  enabled: true

voxtral:small-24b:
  module: core.transcribe
  class: VoxtralTranscriber
  args:
    model_id: mistralai/Voxtral-Small-24B-2507
  enabled: false  # Large model, enable when needed

# --- vLLM backend (remote, opt-in via docker compose --profile vllm) ---
# The VoxHub-side class holds only an HTTP client — zero extra GPU memory
# in the API container. The Voxtral weights live in the `voxtral-vllm`
# service, which loads them on container start. If that service is not
# running, `load()` will fail fast with an actionable error.
voxtral:mini-3b-vllm:
  module: core.transcribe_voxtral_vllm
  class: VoxtralVLLMTranscriber
  args:
    model_id: mistralai/Voxtral-Mini-3B-2507
    # base_url falls back to the VOXTRAL_VLLM_URL env var
    # (defaults to http://voxtral-vllm:8000/v1 in docker-compose).
    # base_url: http://voxtral-vllm:8000/v1
  enabled: true

voxtral:small-24b-vllm:
  module: core.transcribe_voxtral_vllm
  class: VoxtralVLLMTranscriber
  args:
    model_id: mistralai/Voxtral-Small-24B-2507
  enabled: false  # Large model, enable when needed

# ── Whisper (OpenAI via Transformers) ──────────────────────────
whisper:large-v3:
  module: core.transcribe_whisper
  class: WhisperTranscriber
  args:
    model_size: large-v3
  enabled: true

whisper:turbo:
  module: core.transcribe_whisper
  class: WhisperTranscriber
  args:
    model_size: turbo
  enabled: true

whisper:medium:
  module: core.transcribe_whisper
  class: WhisperTranscriber
  args:
    model_size: medium
  enabled: false

whisper:small:
  module: core.transcribe_whisper
  class: WhisperTranscriber
  args:
    model_size: small
  enabled: true

# ── Granite Speech (IBM) ───────────────────────────────────────
# Multilingual (en, fr, de, es, pt, ja). Ships a LoRA adapter — requires peft.
granite:1b-speech:
  module: core.transcribe_granite
  class: GraniteSpeechTranscriber
  args:
    model_id: ibm-granite/granite-4.0-1b-speech
    # Auto-eager on Blackwell; override here to force a specific backend.
    # attn_implementation: sdpa
  enabled: true

# ── Moonshine (UsefulSensors) ──────────────────────────────────
# Note: Moonshine is English-only.
moonshine:base:
  module: core.transcribe_moonshine
  class: MoonshineTranscriber
  args:
    model_name: UsefulSensors/moonshine-base
  enabled: true

moonshine:tiny:
  module: core.transcribe_moonshine
  class: MoonshineTranscriber
  args:
    model_name